<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- css link -->
    <link rel="stylesheet" href="/assets/css/style.css">
    <!-- tailwind css -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- google font Quicksand -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>

    <section
        class="min-h-screen w-full flex flex-col items-center justify-center p-4 sm:p-6 py-16 gap-12 bg-cover bg-center bg-no-repeat bg-gray-50"
        style="background-image: url('/assets/apply/bg.png');">

        <!-- ================= CARD 1: TRACK YOUR APPLICATION ================= -->
        <div class="relative w-full max-w-[420px] mt-8">

            <!-- Top Overlapping Icon -->
            <div class="absolute -top-9 left-1/2 -translate-x-1/2 z-10">
                <div class="w-20 h-20 bg-[#0EA611] rounded-full flex items-center justify-center">
                    <img src="/assets/apply/app.png" class="w-8 h-8" alt="">
                </div>
            </div>

            <!-- Card 1 Content (With Inner Background) -->
            <!-- Ekhane 'card_dots_bg.png' er jaygay apnar dot pattern image diben -->
            <div
                class="relative overflow-hidden bg-white rounded-xl hadow-[0_4px_64px_14px_#F969021F] border-t-[3px] border-r-[3px] border-l-[3px] border-[#f97316] border-b-[3px] border-b-[#05a81e] px-7 pb-8 pt-12">

                <!-- Background Image -->
                <div
                    class="absolute inset-0 bg-[url('/assets/apply/form.png')] bg-cover bg-center bg-no-repeat opacity-20">
                </div>

                <!-- Content -->
                <div class="relative z-10">

                    <!-- Title -->
                    <h2 class="text-xl lg:text-2xl text-[#03507C] font-bold text-center uppercase tracking-wide mb-1.5">
                        TRACK YOUR APPLICATION
                    </h2>

                    <p class="text-[12px] text-center text-[#000000] font-semibold mb-6">
                        Enter your Application Number to check the current status.
                    </p>

                    <!-- Input Group -->
                    <div class="mb-5">
                        <label class="block text-sm font-bold text-[#000000] mb-2 uppercase tracking-wide">
                            Application Number
                        </label>

                        <input type="text" placeholder="e.g. APP-2025-000001"
                            class="w-full bg-white border border-gray-100 rounded-md px-4 py-3.5 text-sm focus:outline-none shadow-[0_4px_64px_0_rgba(0,0,0,0.12)] text-[#000000] font-medium placeholder-gray-400">
                    </div>

                    <!-- Submit Button -->
                    <button type="button"
                        class="w-full bg-[#03507C] hover:bg-[#003655] text-white text-sm font-semibold py-3.5 px-4 rounded-md transition-colors shadow-[0_4px_64px_0_rgba(0,0,0,0.12)] tracking-wide flex justify-center items-center gap-2">

                        Check Status

                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                        </svg>
                    </button>

                </div>

            </div>
        </div>


        <!-- ================= CARD 2: APPLICATION STATUS ================= -->
        <div class="relative w-full max-w-[420px]">

            <!-- Card 2 Content (With Inner Background) -->
            <div
                class="relative overflow-hidden bg-white rounded-xl shadow-lg border-t-[3px] border-r-[3px] border-l-[3px] border-[#f97316] border-b-[3px] border-b-[#05a81e] p-7">

                <!-- Background Image -->
                <div
                    class="absolute inset-0 bg-[url('/assets/apply/form.png')] bg-cover bg-center bg-no-repeat opacity-20">
                </div>

                <!-- Content -->
                <div class="relative z-10">

                    <!-- Header with Badge -->
                    <div class="flex justify-between items-center mb-3">
                        <h3 class="text-base lg:text-xl font-bold text-[#000000] uppercase tracking-wide">
                            Application Number
                        </h3>

                        <div
                            class="flex items-center gap-1.5 border border-[#05a81e] bg-white text-[#03507C] px-2.5 py-1 rounded-md text-[11px] font-bold shadow-sm">
                            <svg class="w-3 h-3 text-[#05a81e]" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                            </svg>
                            Submitted
                        </div>
                    </div>

                    <!-- App Number Box -->
                    <div
                        class="bg-white rounded-md py-3.5 px-4 text-center shadow-[0_4px_64px_0_rgba(0,0,0,0.12)] mb-6">
                        <span class="font-extrabold text-sm tracking-wider text-[#000000]">
                            APP - 2026 - 0000061
                        </span>
                    </div>

                    <!-- Details List -->
                    <div class="space-y-3.5">

                        <div>
                            <div class="font-extrabold text-sm text-[#000000] uppercase">Applicant</div>
                            <div class="text-[13px] text-[#463B3B] font-bold mt-0.5">Sumon Mitra</div>
                            <div class="border-b-[1.5px] border-dotted border-[#F96902] mt-3.5"></div>
                        </div>

                        <div>
                            <div class="font-extrabold text-sm text-[#000000] uppercase">Course</div>
                            <div class="text-[13px] text-[#463B3B] font-bold mt-0.5">Bachelor of Pharmacy</div>
                            <div class="border-b-[1.5px] border-dotted border-[#F96902] mt-3.5"></div>
                        </div>

                        <div>
                            <div class="font-extrabold text-sm text-[#000000] uppercase">Submitted On</div>
                            <div class="text-[13px] text-[#463B3B] font-bold mt-0.5">17 Jul 2026</div>
                            <div class="border-b-[1.5px] border-dotted border-[#F96902] mt-3.5"></div>
                        </div>

                        <div>
                            <div class="font-extrabold text-sm text-[#000000] uppercase">Last Updated</div>
                            <div class="text-[13px] text-[#463B3B] font-bold mt-0.5">17 Jul 2026</div>
                        </div>

                    </div>

                    <!-- Progress Section -->
                    <div class="mt-8">
                        <h4 class="font-bold text-sm lg:text-xl text-[#000000] uppercase mb-6 tracking-wide">
                            Application Progress
                        </h4>

                        <div class="relative flex justify-between items-start px-2">

                            <div class="absolute top-[22px] left-10 right-10 h-[2px] bg-gray-400 z-0"></div>

                            <!-- Step 1 -->
                            <div class="relative z-10 flex flex-col items-center gap-2 w-16">
                                <div
                                    class="w-[45px] h-[45px] bg-[#05a81e] rounded-xl shadow-[0_4px_34px_0_rgba(249,105,2,0.34)] flex items-center justify-center text-white">
                                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
                                    </svg>
                                </div>
                                <span class="text-[11px] font-bold text-[#000000] text-center">Submitted</span>
                            </div>

                            <!-- Step 2 -->
                            <div class="relative z-10 flex flex-col items-center gap-2 w-16">
                                <div
                                    class="w-[45px] h-[45px] bg-[#f97316] rounded-xl shadow-[0_4px_34px_0_rgba(249,105,2,0.34)] flex items-center justify-center text-white">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    </svg>
                                </div>
                                <span class="text-[11px] font-bold text-[#000000] text-center">Under Review</span>
                            </div>

                            <!-- Step 3 -->
                            <div class="relative z-10 flex flex-col items-center gap-2 w-16">
                                <div
                                    class="w-[45px] h-[45px] bg-[#03507C] rounded-xl shadow-[0_4px_34px_0_rgba(249,105,2,0.34)] flex items-center justify-center text-white">
                                    <img src="/assets/apply/appv.png" class="w-6 h-6" alt="">
                                </div>
                                <span class="text-[11px] font-bold text-[#000000] text-center">Approved</span>
                            </div>

                        </div>
                    </div>

                </div>
            </div>
        </div>

    </section>

</body>

</html>
