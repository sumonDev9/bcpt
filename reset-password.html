<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Bengal College</title>
    <!-- css link -->
    <link rel="stylesheet" href="/assets/css/style.css">
    <!-- tailwind css -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- google font Quicksand -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- reset password start here -->
    <section
        class="relative py-12 lg:py-0 w-full min-h-screen flex flex-col lg:flex-row bg-cover bg-center bg-no-repeat"
        style="background-image: url('/assets/apply/loginBg.png');">

        <img src="/assets/apply/shape.png" class="absolute hidden 2xl:block right-0 top-0 h-full bg-contain z-0" alt="">
        <img src="/assets/apply/shape1.png" class="absolute block 2xl:hidden right-0 top-0 h-full bg-contain z-0"
            alt="">

        <!-- ================= LEFT SIDE (Hidden on Phone/Tab, Visible on Desktop) ================= -->
        <div
            class="relative w-full hidden lg:w-1/2 lg:flex flex-col items-center justify-center px-6 pb-64 lg:pb-20 z-10">

            <!-- Logo -->
            <div
                class="w-32 h-32 bg-white rounded-full flex items-center justify-center p-2 shadow-lg mb-4 border-4 border-green-500">
                <img src="/assets/apply/logo.png" alt="Logo" class="w-full h-full object-contain rounded-full">
            </div>

            <!-- Title -->
            <h1 class="text-3xl font-bold text-white text-center">Bengal College of</h1>
            <h2 class="text-3xl font-bold text-[#34D838] text-center mb-2">Pharmaceutical Technology</h2>
            <div class="w-16 h-1 bg-gradient-to-r from-[#F96902] to-[#34D838] mb-8 rounded-full"></div>

            <!-- Features Box (Reset Password Related) -->
            <div
                class="bg-[#073F5F]/30 border border-[#34D838] rounded-2xl p-6 w-full max-w-sm flex flex-col gap-4 shadow-[0_4px_48px_8px_rgba(249,105,2,0.33)]">
                <!-- Feature 1 -->
                <div class="flex items-center gap-4">
                    <div
                        class="w-14 h-14 bg-white rounded-xl flex items-center justify-center shrink-0 border border-[#F96902]">
                        <svg class="w-7 h-7 text-[#F96902]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                        </svg>
                    </div>
                    <span class="text-white font-semibold text-xl">New Credentials</span>
                </div>
                <!-- Feature 2 -->
                <div class="flex items-center gap-4">
                    <div
                        class="w-14 h-14 bg-white rounded-xl flex items-center justify-center shrink-0 border border-[#34D838]">
                        <svg class="w-7 h-7 text-[#34D838]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                        </svg>
                    </div>
                    <span class="text-white font-semibold text-xl">Strong Security</span>
                </div>
                <!-- Feature 3 -->
                <div class="flex items-center gap-4">
                    <div
                        class="w-14 h-14 bg-white rounded-xl flex items-center justify-center shrink-0 border border-[#03507C]">
                        <svg class="w-7 h-7 text-[#03507C]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </div>
                    <span class="text-white font-semibold text-xl">Instant Update</span>
                </div>
            </div>

            <!-- Left Side Text -->
            <div class="flex items-center gap-4 mt-8">
                <div
                    class="bg-[#F96902] border border-[#FFF3F3] border-dashed w-12 h-12 rounded-full shadow-[0_4px_34px_0_rgba(52,216,56,0.48)] flex items-center justify-center shrink-0">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <div>
                    <h2 class="text-[#FFFFFF] text-xl lg:text-2xl font-bold">Secure Your Account</h2>
                    <p class="text-[#FFFFFF] text-sm mt-1">Create a strong, unique password to keep <br> your personal
                        information protected.</p>
                </div>
            </div>

            <!-- Boys Image -->
            <img src="/assets/apply/student.png" alt="Students"
                class="absolute left-0 bottom-0 w-64 hidden 2xl:block 2xl:w-[300px] object-contain pointer-events-none z-20">

        </div>

        <!-- ================= RIGHT SIDE (Visible all devices, Centered on Mobile/Tab) ================= -->
        <div
            class="relative w-full lg:w-1/2 flex items-center justify-center p-4 lg:p-10 min-h-screen lg:min-h-[600px] z-10">

            <!-- Form Card Wrapper -->
            <div class="relative bg-white rounded-[2rem] shadow-2xl border border-gray-100 w-full max-w-[440px] p-8 md:p-10 z-20 bg-cover bg-center"
                style="background-image: url('/assets/apply/backlogin.png');">

                <!-- Header -->
                <div class="text-center mb-10">
                    <div
                        class="w-16 h-16 bg-orange-50 rounded-full flex items-center justify-center mx-auto mb-4 border-2 border-orange-200">
                        <svg class="w-8 h-8 text-[#F96902]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                        </svg>
                    </div>
                    <h2 class="text-2xl md:text-3xl font-bold text-[#F96902] tracking-wide mb-2 uppercase">Reset
                        Password</h2>
                    <div class="w-12 rounded-lg h-1 bg-gradient-to-r from-[#34D838] to-[#F96902] mx-auto mb-3"></div>
                    <p class="text-gray-500 font-semibold text-sm">Please enter your new password below.</p>
                </div>

                <form action="#" method="POST" class="space-y-6">

                    <!-- New Password Field -->
                    <div>
                        <label class="block text-sm font-bold text-[#000000] mb-1.5 pl-2">New Password</label>
                        <div
                            class="relative flex items-center border border-[#F96902] hover:border-orange-500 shadow-[0_4px_54px_0_rgba(249,105,2,0.14)] transition-colors rounded-full bg-white p-1">
                            <div
                                class="bg-[#f97316] text-white rounded-full w-10 h-10 flex items-center justify-center shrink-0 shadow-inner">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </div>
                            <input type="password" id="new-password" placeholder="Enter New Password" required
                                class="w-full pl-3 pr-10 py-2 outline-none text-sm text-gray-700 bg-transparent rounded-r-full font-medium">

                            <!-- Toggle Button for New Password -->
                            <button type="button"
                                onclick="togglePassword('new-password', 'eye-icon-1', 'eye-slash-icon-1')"
                                class="absolute right-4 text-gray-400 hover:text-gray-600 focus:outline-none flex items-center justify-center w-6 h-6">
                                <svg id="eye-icon-1" class="w-5 h-5" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                                <svg id="eye-slash-icon-1" class="w-5 h-5 hidden" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm Password Field -->
                    <div>
                        <label class="block text-sm font-bold text-[#000000] mb-1.5 pl-2">Confirm Password</label>
                        <div
                            class="relative flex items-center border border-[#F96902] hover:border-orange-500 shadow-[0_4px_54px_0_rgba(249,105,2,0.14)] transition-colors rounded-full bg-white p-1">
                            <div
                                class="bg-[#f97316] text-white rounded-full w-10 h-10 flex items-center justify-center shrink-0 shadow-inner">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M9 12l2 2 4-4m6 2a2 2 0 11-4 0 2 2 0 014 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2z" />
                                </svg>
                            </div>
                            <input type="password" id="confirm-password" placeholder="Confirm New Password" required
                                class="w-full pl-3 pr-10 py-2 outline-none text-sm text-gray-700 bg-transparent rounded-r-full font-medium">

                            <!-- Toggle Button for Confirm Password -->
                            <button type="button"
                                onclick="togglePassword('confirm-password', 'eye-icon-2', 'eye-slash-icon-2')"
                                class="absolute right-4 text-gray-400 hover:text-gray-600 focus:outline-none flex items-center justify-center w-6 h-6">
                                <svg id="eye-icon-2" class="w-5 h-5" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                                <svg id="eye-slash-icon-2" class="w-5 h-5 hidden" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="pt-4 flex flex-col items-center gap-5">

                        <!-- Submit Button -->
                        <button type="submit"
                            class="bg-gradient-to-r from-[#04456B] to-[#1C687E] border border-white shadow-[0_4px_34px_0_rgba(3,80,124,0.34)] text-white px-8 py-3.5 rounded-full font-bold hover:opacity-90 transition flex items-center justify-center gap-2 tracking-wide w-full max-w-[250px]">
                            Update Password
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M5 13l4 4L19 7" />
                            </svg>
                        </button>

                        <!-- Back to Login Link -->
                        <a href="login.html"
                            class="text-sm font-bold text-gray-500 hover:text-[#F96902] transition-colors flex items-center gap-1.5 group">
                            <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform" fill="none"
                                stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                            </svg>
                            Back to Login
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </section>
    <!-- reset password end here -->

    <!-- Script for Multiple Password Toggles -->
    <script>
        function togglePassword(inputId, eyeIconId, eyeSlashIconId) {
            const passwordInput = document.getElementById(inputId);
            const eyeIcon = document.getElementById(eyeIconId);
            const eyeSlashIcon = document.getElementById(eyeSlashIconId);

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeSlashIcon.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeSlashIcon.classList.add('hidden');
            }
        }
    </script>

</body>

</html>
