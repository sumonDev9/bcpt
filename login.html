<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- css link -->
    <link rel="stylesheet" href="/assets/css/style.css">
    <!-- tailwind css -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- google font Quicksand -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- login start here -->
    <section
        class="relative py-12 lg:py-0 w-full min-h-screen flex flex-col lg:flex-row bg-cover bg-center bg-no-repeat"
        style="background-image: url('/assets/apply/loginBg.png');">

        <img src="/assets/apply/shape.png" class="absolute hidden 2xl:block right-0 top-0 h-full bg-contain z-0" alt="">
        <img src="/assets/apply/shape1.png" class="absolute block 2xl:hidden right-0 top-0 h-full bg-contain z-0"
            alt="">

        <!-- ================= LEFT SIDE (Hidden on Phone/Tab, Visible on Desktop) ================= -->
        <div
            class="relative w-full hidden lg:w-1/2 lg:flex flex-col items-center justify-center px-6 pb-64 lg:pb-20 z-10">

            <!-- Logo -->
            <div
                class="w-32 h-32 bg-white rounded-full flex items-center justify-center p-2 shadow-lg mb-4 border-4 border-green-500">
                <img src="/assets/apply/logo.png" alt="Logo" class="w-full h-full object-contain rounded-full">
            </div>

            <!-- Title -->
            <h1 class="text-3xl font-bold text-white text-center">Bengal College of</h1>
            <h2 class="text-3xl font-bold text-[#34D838] text-center mb-2">Pharmaceutical Technology</h2>
            <div class="w-16 h-1 bg-gradient-to-r from-[#F96902] to-[#34D838] mb-8 rounded-full"></div>

            <!-- Features Box -->
            <div
                class="bg-[#073F5F]/30 border border-[#34D838] rounded-2xl p-6 w-full max-w-sm flex flex-col gap-4 shadow-[0_4px_48px_8px_rgba(249,105,2,0.33)]">
                <!-- Feature 1 -->
                <div class="flex items-center gap-4">
                    <div
                        class="w-14 h-14 bg-white rounded-xl flex items-center justify-center shrink-0 border border-[#F96902]">
                        <img src="/assets/apply/lock.png" class="w-10 h-10 object-contain" alt="">
                    </div>
                    <span class="text-white font-semibold text-xl">Secure Access</span>
                </div>
                <!-- Feature 2 -->
                <div class="flex items-center gap-4">
                    <div
                        class="w-14 h-14 bg-white rounded-xl flex items-center justify-center shrink-0 border border-[#34D838]">
                        <img src="/assets/apply/user.png" class="w-10 h-10 object-contain" alt="">
                    </div>
                    <span class="text-white font-semibold text-xl">Role Based Portal</span>
                </div>
                <!-- Feature 3 -->
                <div class="flex items-center gap-4">
                    <div
                        class="w-14 h-14 bg-white rounded-xl flex items-center justify-center shrink-0 border border-[#03507C]">
                        <img src="/assets/apply/skill.png" class="w-10 h-10 object-contain" alt="">
                    </div>
                    <span class="text-white font-semibold text-xl">Smart Management</span>
                </div>
            </div>

            <div class="flex items-center gap-3 mt-5">
                <div
                    class="bg-[#F96902] border border-[#FFF3F3] border-dashed w-10 h-10 rounded-full shadow-[0_4px_34px_0_rgba(52,216,56,0.48)] flex items-center justify-center">
                    <img src="/assets/apply/hat.png" class="w-6 h-6" alt="">
                </div>
                <div>
                    <h2 class="text-[#FFFFFF] text-xl lg:text-2xl font-bold">Welcome Back!</h2>
                    <p class="text-[#FFFFFF] text-sm">Please login to access your dashboard and manage the <br> system
                        efficiently.</p>
                </div>
            </div>

            <!-- Boys Image -->
            <img src="/assets/apply/student.png" alt="Students"
                class="absolute left-0 bottom-0 w-64 hidden 2xl:block 2xl:w-[300px] object-contain pointer-events-none z-20">

        </div>

        <!-- ================= RIGHT SIDE (Visible all devices, Centered on Mobile/Tab) ================= -->
        <div
            class="relative w-full lg:w-1/2 flex items-center justify-center p-4 lg:p-10 min-h-screen lg:min-h-[600px] z-10">

            <!-- Form Card Wrapper -->
            <div class="relative bg-white rounded-[2rem] shadow-2xl border border-gray-100 w-full max-w-[480px] p-6 md:p-8 pt-16 z-20 bg-cover bg-center"
                style="background-image: url('/assets/apply/backlogin.png');">

                <!-- Absolute Top 3 Buttons (Responsive) -->
                <div
                    class="absolute -top-4 md:-top-6 left-0 right-0 flex justify-center items-center gap-1.5 md:gap-2 px-2">
                    <!-- Admin -->
                    <button
                        class="bg-[#F96902] text-white flex flex-col items-center justify-center px-3 py-1.5 md:px-4 rounded-full hover:scale-105 transition w-full md:w-auto">
                        <div class="flex items-center gap-2 font-bold text-sm">
                            <!-- Icon hidden on mobile, block on tab/desktop -->
                            <div class="hidden md:flex w-10 h-10 bg-white rounded-full items-center justify-center">
                                <img src="/assets/apply/log1.png" class="w-7 h-7 object-contain" alt="">
                            </div>
                            <div class="text-center md:text-left">
                                <p class="text-[12px] md:text-sm">Admin</p>
                                <!-- Subtitle hidden on mobile -->
                                <span class="hidden md:block text-[10px]">Administrator</span>
                            </div>
                        </div>
                    </button>
                    <!-- Students -->
                    <button
                        class="bg-[#0EA611] text-white flex flex-col items-center justify-center px-3 py-1.5 md:px-4 rounded-full hover:scale-105 transition w-full md:w-auto">
                        <div class="flex items-center gap-2 font-bold text-sm">
                            <div class="hidden md:flex w-10 h-10 bg-white rounded-full items-center justify-center">
                                <img src="/assets/apply/log2.png" class="w-7 h-7 object-contain" alt="">
                            </div>
                            <div class="text-center md:text-left">
                                <p class="text-[12px] md:text-sm">Students</p>
                                <span class="hidden md:block text-[10px]">Student Portal</span>
                            </div>
                        </div>
                    </button>
                    <!-- Staff -->
                    <button
                        class="bg-[#03507C] text-white flex flex-col items-center justify-center px-3 py-1.5 md:px-4 rounded-full hover:scale-105 transition w-full md:w-auto">
                        <div class="flex items-center gap-2 font-bold text-sm">
                            <div class="hidden md:flex w-10 h-10 bg-white rounded-full items-center justify-center">
                                <img src="/assets/apply/log3.png" class="w-7 h-7 object-contain" alt="">
                            </div>
                            <div class="text-center md:text-left">
                                <p class="text-[12px] md:text-sm">Staff</p>
                                <span class="hidden md:block text-[10px]">Staff Portal</span>
                            </div>
                        </div>
                    </button>
                </div>

                <div class="text-center mb-8 mt-2 md:mt-0">
                    <h2 class="text-3xl font-bold text-[#F96902] tracking-wide mb-1">LOGIN</h2>
                    <div class="w-10 rounded-lg h-1 bg-gradient-to-r from-[#34D838] to-[#F96902] mx-auto mb-2"></div>
                    <p class="text-[#000000] font-semibold text-base">Sign in to your account</p>
                </div>

                <form action="#" method="POST" class="space-y-5">

                    <!-- Email Field -->
                    <div>
                        <label class="block text-sm font-bold text-[#000000] mb-1.5 pl-2">Email Address</label>
                        <div
                            class="relative flex items-center border border-[#F96902] hover:border-orange-500 transition-colors rounded-full bg-white shadow-[0_4px_54px_0_rgba(249,105,2,0.14)] p-1">
                            <div
                                class="bg-[#f97316] text-white rounded-full w-10 h-10 flex items-center justify-center shrink-0 shadow-inner">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                </svg>
                            </div>
                            <input type="email" placeholder="Enter Your Email"
                                class="w-full px-3 py-2 outline-none text-sm text-gray-700 bg-transparent rounded-r-full">
                        </div>
                    </div>

                    <!-- Password Field -->
                    <div>
                        <label class="block text-sm font-bold text-[#000000] mb-1.5 pl-2">Password</label>
                        <div
                            class="relative flex items-center border border-[#F96902] hover:border-orange-500 shadow-[0_4px_54px_0_rgba(249,105,2,0.14)] transition-colors rounded-full bg-white p-1">
                            <div
                                class="bg-[#f97316] text-white rounded-full w-10 h-10 flex items-center justify-center shrink-0 shadow-inner">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                                </svg>
                            </div>
                            <input type="password" id="password" placeholder="Enter Your Password"
                                class="w-full pl-3 pr-10 py-2 outline-none text-sm text-gray-700 bg-transparent rounded-r-full">

                            <button type="button" onclick="togglePassword()"
                                class="absolute right-4 text-gray-400 hover:text-gray-600 focus:outline-none flex items-center justify-center w-6 h-6">
                                <svg id="eye-icon" class="w-5 h-5" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                                </svg>
                                <svg id="eye-slash-icon" class="w-5 h-5 hidden" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Remember & Forgot -->
                    <div class="flex justify-between items-center px-2">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" class="w-4 h-4 accent-orange-500 rounded border-gray-300">
                            <span class="text-sm font-medium text-[#000000]">Remember Me</span>
                        </label>
                        <a href="#" class="text-sm font-bold text-[#F96902] hover:underline">Forgot Password</a>
                    </div>

                    <!-- CAPTCHA Section -->
                    <div class="pt-2">
                        <div class="max-w-md mx-auto">
                            <div class="flex gap-3 mb-3">
                                <div
                                    class="flex-1 border border-[#F96902] bg-white rounded-xl flex justify-around items-center py-2.5 text-[#F96902] text-2xl font-bold bg-[radial-gradient(#e5e7eb_1.5px,transparent_1.5px)] [background-size:16px_16px] tracking-widest shadow-inner">
                                    <span>8</span><span>3</span><span>6</span><span>6</span><span>4</span><span>6</span>
                                </div>
                                <button type="button"
                                    class="border border-[#F96902] bg-white rounded-xl px-4 md:px-5 text-[#F96902] hover:bg-green-100 transition shadow-sm flex items-center justify-center">
                                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                                    </svg>
                                </button>
                            </div>
                            <div class="relative">
                                <div
                                    class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                                    </svg>
                                </div>
                                <input type="text" placeholder="Enter CAPTCHA code"
                                    class="w-full pl-12 pr-4 py-3 border border-[#F96902] bg-white rounded-xl outline-none focus:border-green-500 text-[#000000] shadow-[0_4px_54px_0_rgba(249,105,2,0.14)] transition font-medium">
                            </div>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="pt-3 flex justify-center">
                        <button type="submit"
                            class="bg-gradient-to-r from-[#04456B] to-[#1C687E] border border-white shadow-[0_4px_34px_0_rgba(3,80,124,0.34)] text-white px-10 py-3 rounded-full font-bold hover:bg-blue-900 transition flex items-center gap-2 tracking-wide w-48 justify-center">
                            Login
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M17 8l4 4m0 0l-4 4m4-4H3" />
                            </svg>
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </section>
    <!-- login end here -->

    <!-- Script for Password Toggle -->
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const eyeIcon = document.getElementById('eye-icon');
            const eyeSlashIcon = document.getElementById('eye-slash-icon');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.classList.add('hidden');
                eyeSlashIcon.classList.remove('hidden');
            } else {
                passwordInput.type = 'password';
                eyeIcon.classList.remove('hidden');
                eyeSlashIcon.classList.add('hidden');
            }
        }
    </script>

</body>

</html>
